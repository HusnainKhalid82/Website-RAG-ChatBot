<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Website RAG Chatbot</title>
  <style>
    body { font-family: Arial, sans-serif; margin: 0; padding: 0; background: #f4f7fb; color: #111; }
    .page { max-width: 900px; margin: 40px auto; padding: 24px; background: #fff; border-radius: 16px; box-shadow: 0 12px 36px rgba(0,0,0,0.08); }
    h1 { margin-top: 0; }
    label { display: block; margin-top: 16px; font-weight: 600; }
    input, textarea, button { width: 100%; font-size: 1rem; padding: 12px 14px; margin-top: 8px; border: 1px solid #d4d9e3; border-radius: 10px; }
    textarea { min-height: 140px; resize: vertical; }
    button { background: #2563eb; color: white; border: none; cursor: pointer; font-weight: 700; }
    button:hover { background: #1d4ed8; }
    .row { display: grid; gap: 16px; grid-template-columns: 1fr 1fr; }
    .full { grid-column: 1 / -1; }
    .panel { background: #f8fafc; padding: 18px; border-radius: 14px; border: 1px solid #e2e8f0; }
    .response { white-space: pre-wrap; line-height: 1.6; }
    .note { margin-top: 12px; color: #475569; }
  </style>
</head>
<body>
  <div class="page">
    <h1>Website RAG Chatbot</h1>
    <p>Ingest a website and ask questions against the ingested content.</p>

    <div class="panel">
      <label for="siteUrl">Website URL</label>
      <input id="siteUrl" type="url" placeholder="https://example.com" />
      <label for="maxPages">Max pages to ingest</label>
      <input id="maxPages" type="number" min="1" max="10" value="3" />
      <button id="ingestBtn">Ingest website</button>
      <div id="ingestStatus" class="note"></div>
    </div>

    <div class="panel full">
      <label for="question">Ask a question</label>
      <textarea id="question" placeholder="What is this website about?"></textarea>
      <label for="conversationId">Conversation ID (optional for follow-ups)</label>
      <input id="conversationId" type="text" placeholder="same-id keeps history" />
      <button id="chatBtn">Send question</button>
      <div id="chatStatus" class="note"></div>
    </div>

    <div class="row">
      <div class="panel">
        <h3>Answer</h3>
        <div id="answer" class="response"></div>
      </div>
      <div class="panel">
        <h3>Sources</h3>
        <div id="sources" class="response"></div>
      </div>
    </div>
  </div>

  <script>
    const ingestBtn = document.getElementById('ingestBtn');
    const chatBtn = document.getElementById('chatBtn');
    const ingestStatus = document.getElementById('ingestStatus');
    const chatStatus = document.getElementById('chatStatus');
    const answerDiv = document.getElementById('answer');
    const sourcesDiv = document.getElementById('sources');

    ingestBtn.addEventListener('click', async () => {
      ingestStatus.textContent = 'Ingesting...';
      const siteUrl = document.getElementById('siteUrl').value.trim();
      const maxPages = parseInt(document.getElementById('maxPages').value, 10) || 3;
      try {
        const resp = await fetch('/ingest', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ site_url: siteUrl, max_pages: maxPages }),
        });
        const data = await resp.json();
        if (!resp.ok) throw new Error(data.detail || JSON.stringify(data));
        ingestStatus.textContent = 'Ingest successful: ' + JSON.stringify(data.detail);
      } catch (err) {
        ingestStatus.textContent = 'Ingest error: ' + err.message;
      }
    });

    chatBtn.addEventListener('click', async () => {
      chatStatus.textContent = 'Sending question...';
      const siteUrl = document.getElementById('siteUrl').value.trim();
      const question = document.getElementById('question').value.trim();
      const conversationId = document.getElementById('conversationId').value.trim() || null;
      try {
        const resp = await fetch('/chat', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ site_url: siteUrl, question, conversation_id: conversationId }),
        });
        const data = await resp.json();
        if (!resp.ok) throw new Error(data.detail || JSON.stringify(data));
        const result = data.result || {};
        answerDiv.textContent = result.answer || 'No answer returned.';
        sourcesDiv.textContent = (result.source_citations || []).join('\n');
        chatStatus.textContent = 'Question answered.';
      } catch (err) {
        chatStatus.textContent = 'Chat error: ' + err.message;
      }
    });
  </script>
</body>
</html>
